# make_grid.py reads this to generate grid.jsonl to run a set of experiments

regimes:
  #- bear
  #- bull
  - newest

horizons:
  - 1
  #- 10    # 2w
  #- 21    # 1m
  #- 63    # 3m

context_lengths:
  - 22
  - 32
  - 48
  #- 96

strategies:
  - mimo
  #- recursive

steps:       # only used when strategy = recursive
  #- 1
  #- 32

training_mode:
  - per_ticker

seeds:
  - 2024

global_scalers:
  - none
  - minmax
  #- zscore

models:
  rf:
    n_estimators: [200]
    max_depth: [null, 10]
    max_features: [1, "sqrt"]
    min_samples_leaf: [1, 2]

  lstm:
    hidden_size: [64, 128]
    num_layers: [1, 2]
    dropout: [0.1]
    lr: [0.001]
    batch_size: [32]
    use_window_scaling: [false, true]

  patchtst:
    d_model: [64, 128]
    num_attention_heads: [4, 8]
    num_hidden_layers: [3]
    patch_length: [2]
    patch_stride: [1]
    dropout: [0.2]
    lr: [0.0015]
    use_window_scaling: [true, false]